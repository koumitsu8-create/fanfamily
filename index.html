<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Family Connect - fanfamily</title>
    <script src="https://cdn.jsdelivr.net/npm/@skyway-sdk/room/dist/skyway_room-latest.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; padding: 20px; }
        video { width: 100%; border-radius: 12px; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .status-bar { padding: 15px; background: #333; font-weight: bold; border-bottom: 2px solid #444; }
        .video-wrapper { position: relative; }
        .label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="status-bar" id="status-msg">合言葉を入力してください</div>
    <div id="video-grid">
        <div class="video-wrapper">
            <span class="label">自分のカメラ</span>
            <video id="local-video" muted playsinline></video>
        </div>
    </div>

    <script>
        const CONFIG = {
            MY_PASS: "コウ",
            APP_ID: "ccd67f44-d9e7-4e05-aa77-477a7ac1e160",
            SECRET_KEY: "DFWskGkiYny+I6E8IzdDzE/zRVrDuavLQrJV6CqWzIA=",
            ROOM_NAME: "fanfamily-global-room"
        };

        const userInput = prompt("合言葉（パスワード）を入力してください");
        if (userInput !== CONFIG.MY_PASS) {
            alert("合言葉が正しくありません。");
            window.stop();
        } else {
            init();
        }

        async function init() {
            const status = document.getElementById('status-msg');
            const { SkyWayContext, SkyWayRoom, SkyWayStreamFactory } = skyway_room;

            try {
                // 1. カメラとマイクの取得（マニュアル通りの最新メソッドに変更）
                const localVideo = document.getElementById('local-video');
                const { audio, video } = await SkyWayStreamFactory.createMicrophoneAudioAndCameraStream({
                    video: { width: 320, height: 240, frameRate: 15 }
                });
                
                video.attach(localVideo);
                await localVideo.play();

                // 2. SkyWayへの接続（マニュアル記載の簡単・確実な認証方式に変更）
                const context = await SkyWayContext.CreateForDevelopment(CONFIG.APP_ID, CONFIG.SECRET_KEY);
                const room = await SkyWayRoom.FindOrCreate(context, { type: 'sfu', name: CONFIG.ROOM_NAME });
                const me = await room.join();
                
                status.innerText = "接続完了：ご家族がURLを開くのを待っています...";

                // 自分の映像・音声を配信
                await me.publish(audio);
                await me.publish(video);

                // 3. 相手の映像を受信して表示
                const subscribeAndAttach = async (publication) => {
                    if (publication.publisher.id === me.id) return;
                    
                    const { stream } = await me.subscribe(publication.id);
                    let el = document.getElementById(`media-${publication.id}`);
                    
                    if (!el) {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'video-wrapper';
                        
                        // マニュアル通りの映像/音声判定処理
                        el = document.createElement(stream.track.kind === 'video' ? 'video' : 'audio');
                        el.id = `media-${publication.id}`;
                        el.playsInline = true; 
                        el.autoplay = true;
                        
                        wrapper.appendChild(el);
                        document.getElementById('video-grid').appendChild(wrapper);
                    }
                    stream.attach(el);
                };

                // 既に入室している人の映像を取得
                room.publications.forEach(subscribeAndAttach);
                // 新しく入室した人の映像を取得
                room.onStreamPublished.add((e) => subscribeAndAttach(e.publication));
                
                // 相手が退出した時の処理
                room.onStreamUnpublished.add((e) => {
                    document.getElementById(`media-${e.publication.id}`)?.parentNode?.remove();
                });

            } catch (e) {
                alert("【エラー内容】\n" + e.message);
                status.innerText = "エラーが発生しました。カメラとマイクの許可を確認してください。";
            }
        }
    </script>
</body>
</html>
